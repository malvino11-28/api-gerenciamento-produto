<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <!-- Título -->
      <h2 class="text-center mb-4">Lista de Produtos</h2>

      <!-- Tabela -->
      <div class="card shadow-sm p-3 mb-4">
        <div class="table-responsive">
          <table
            class="table table-bordered table-hover text-center align-middle"
          >
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Quantidade</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Excluir -->
      <div class="card shadow-sm p-4 mb-4">
        <h5 class="mb-3">Excluir Produto</h5>

        <form id="formD" class="row g-3 align-items-center">
          <div class="col-md-4">
            <input
              type="number"
              id="id"
              class="form-control"
              placeholder="ID do produto"
            />
          </div>

          <div class="col-md-3">
            <button type="submit" class="btn btn-danger w-100">Excluir</button>
          </div>

          <div class="col-12">
            <small id="msg" class="text-danger d-none">
              Informe um ID válido
            </small>
          </div>
        </form>
      </div>

      <!-- Atualizar -->
      <div class="card shadow-sm p-4">
        <h5 class="mb-3">Atualizar Produto</h5>

        <form id="formP" class="row g-3">
          <div class="col-md-4">
            <input
              type="number"
              id="idPut"
              class="form-control"
              placeholder="ID do produto"
            />
          </div>

          <div class="col-md-4">
            <input
              type="text"
              id="namePut"
              class="form-control"
              placeholder="Novo nome"
            />
          </div>

          <div class="col-md-4">
            <input
              type="text"
              id="descPut"
              class="form-control"
              placeholder="Nova descrição"
            />
          </div>

          <div class="col-md-3">
            <input
              type="number"
              step="0.01"
              id="valorPut"
              class="form-control"
              placeholder="Novo valor"
            />
          </div>

          <div class="col-md-3">
            <input
              type="number"
              id="qtdPut"
              class="form-control"
              placeholder="Nova quantidade"
            />
          </div>

          <div class="col-md-3">
            <button type="submit" class="btn btn-primary w-100">
              Atualizar
            </button>
          </div>

          <div class="col-12">
            <small id="msgPut" class="text-danger d-none">
              Informe os dados corretamente
            </small>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/public/js/atualiza.js"></script>
    <script type="module" src="/public/js/delete.js"></script>
    <script type="module" src="/public/js/lista.js"></script>
  </body>
</html>
